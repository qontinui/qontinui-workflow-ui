name: Publish to npm

# Tag-triggered publish via npm Trusted Publishing (OIDC). No long-lived
# NPM_TOKEN — GitHub mints a short-lived OIDC JWT that npm verifies
# against the per-package trust policy configured at npmjs.com.
#
# To release: bump `version` in package.json + commit on master, then:
#   git tag v<version>
#   git push origin v<version>
#
# One-time npmjs.com setup (per package, by an @qontinui maintainer):
#   npmjs.com → @qontinui/workflow-ui → Settings → Trusted Publisher →
#   Add: organization=qontinui, repository=qontinui-workflow-ui,
#        workflow filename=publish.yml, environment=(blank).
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for npm trusted publishing — GitHub mints a short-lived
      # OIDC JWT that npm verifies against the per-package trust policy
      # configured at npmjs.com. No long-lived NPM_TOKEN secret needed.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to 11.5.1+ for trusted publishing
        # actions/setup-node@v4 with node@20 ships npm@10.8.2, but npm
        # Trusted Publishers requires 11.5.1+. Without this, the publish
        # step sends an empty auth header and gets 404 even when the
        # OIDC + provenance flow succeeds.
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        # --provenance generates an attestation linking the npm tarball
        # back to this exact commit + workflow run, signed by the OIDC
        # token. Surfaces on the package's npm page under "Provenance".
        run: npm publish --access public --provenance
